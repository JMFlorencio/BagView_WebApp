<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root { --accent: #00ff88; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000 !important; font-family: 'Segoe UI', sans-serif; color: white; }

        /* CAMERA FIX: This CSS makes sure the camera feed stays behind your UI */
        video { 
            position: fixed !important; 
            top: 0 !important; 
            left: 0 !important; 
            width: 100vw !important; 
            height: 100vh !important; 
            object-fit: cover !important; 
            z-index: 1 !important; 
        }
        a-scene { z-index: 2 !important; }

        /* WELCOME/START PAGE */
        #welcome-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 0.5s; }
        .start-btn { padding: 20px 40px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; letter-spacing: 2px; border-radius: 50px; cursor: pointer; margin-top: 20px; }

        /* TUTORIAL SCREEN */
        #tutorial-screen { position: fixed; inset: 0; z-index: 9998; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.5s; }
        .video-container { width: 85%; max-width: 500px; aspect-ratio: 16/9; border: 2px solid var(--accent); background: #000; overflow: hidden; }
        #tuto-video { width: 100%; height: 100%; object-fit: cover; }
        .skip-btn { margin-top: 25px; background: none; border: none; color: #666; font-size: 10px; letter-spacing: 2px; text-decoration: underline; cursor: pointer; }

        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0; transition: 0.5s; }
        .top-nav, .bottom-area, .station-card, .icon-btn, .cam-btn { pointer-events: auto; }

        /* NAV STYLES */
        .top-nav { position: absolute; top: 0; left: 0; right: 0; padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .gps-display { background: var(--glass); backdrop-filter: var(--blur); padding: 10px 18px; border-radius: 12px; border-left: 3px solid #444; display: flex; align-items: center; gap: 10px; }
        .gps-display.live { border-left-color: var(--accent); }
        .pulse { width: 8px; height: 8px; background: #444; border-radius: 50%; }
        .pulse.live { background: var(--accent); animation: pulse-anim 2s infinite; }

        /* BOTTOM DOCK */
        .bottom-area { position: absolute; bottom: 0; left: 0; right: 0; }
        .bottom-dock { padding: 20px 0 130px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); opacity: 0; transform: translateY(50px); transition: 0.5s; }
        .bottom-dock.visible { opacity: 1; transform: translateY(0); }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; padding: 20px 20px; scrollbar-width: none; }
        
        .station-card { min-width: 100px; height: 130px; background: #111; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; transition: 0.4s; }
        .station-card.react { transform: translateY(-35px); border-color: var(--accent); }

        .nav-bar { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 25px; }
        .cam-btn { width: 75px; height: 75px; border-radius: 50%; background: #000; border: 3px solid #333; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .cam-btn.active { border-color: var(--accent); background: var(--accent); }

        #shutter { position: fixed; inset: 0; z-index: 50; background: #000; opacity: 0; pointer-events: none; }
        @keyframes pulse-anim { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(2.5); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="letter-spacing:10px;">BAGVIEW</h1>
        <p style="opacity:0.6; font-size:12px;">ECO-TOURISM INTERACTIVE GUIDE</p>
        <button class="start-btn" onclick="startTutorial()">START SCANNER</button>
    </div>

    <div id="tutorial-screen">
        <div class="video-container">
            <video id="tuto-video" playsinline loop>
                <source src="Assets/tutorial.mp4" type="video/mp4">
            </video>
        </div>
        <button class="skip-btn" onclick="initExperience()">SKIP GUIDE</button>
    </div>

    <div id="ui-layer">
        <div class="top-nav">
            <div class="gps-display" id="status-box">
                <div class="pulse" id="status-pulse"></div>
                <div id="gps-status" style="font-size:10px; font-weight:900; letter-spacing:1.5px; color:#666;">CAMERA: STANDBY</div>
            </div>
        </div>

        <div class="bottom-area">
            <div class="bottom-dock" id="gallery-hud">
                <div class="scroll-container" id="gallery-root"></div>
            </div>
            <div class="nav-bar">
                <div class="cam-btn active" id="cam-toggle" onclick="toggleScanner()">
                    <svg viewBox="0 0 24 24" width="32" fill="black" id="cam-icon"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm7-4h-2.69l-1.83-2H9.52l-1.83 2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <div id="shutter"></div>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded renderer="transparent: true; alpha: true;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="target-0"></a-entity>
        </a-scene>

    <script>
        const stations = [
            { name: "Map", thumb: "Assets/A1_Map.jpg", url: "https://jmflorencio.github.io/BaguioBotanicalMap/" },
            { name: "Arbor", thumb: "Assets/Arbor.png", url: "https://tour.panoee.net/69aa67e9add064456619ce3d/69aa73d3add0647cc419cf6d" }
            // ... (keep your full list here)
        ];

        function startTutorial() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                const tutorial = document.getElementById('tutorial-screen');
                tutorial.style.display = 'flex';
                setTimeout(() => { tutorial.style.opacity = '1'; document.getElementById('tuto-video').play(); }, 50);
            }, 500);
        }

        async function initExperience() {
            document.getElementById('tuto-video').pause();
            document.getElementById('tutorial-screen').style.display = 'none';
            document.getElementById('ui-layer').style.opacity = '1';
            
            const sceneEl = document.querySelector('a-scene');
            await sceneEl.systems['mindar-image-system'].start();
            updateStatusUI(true);
        }

        function updateStatusUI(isLive) {
            const btn = document.getElementById('cam-toggle');
            const statusBox = document.getElementById('status-box');
            const statusPulse = document.getElementById('status-pulse');
            const statusText = document.getElementById('gps-status');
            const hud = document.getElementById('gallery-hud');

            if(isLive) {
                btn.classList.add('active'); hud.classList.add('visible');
                statusBox.classList.add('live'); statusPulse.classList.add('live');
                statusText.innerText = "CAMERA: LIVE"; statusText.style.color = "var(--accent)";
            } else {
                btn.classList.remove('active'); hud.classList.remove('visible');
                statusBox.classList.remove('live'); statusPulse.classList.remove('live');
                statusText.innerText = "CAMERA: STANDBY"; statusText.style.color = "#666";
            }
        }

        // ONLY OPEN LINKS ON SCAN
        document.getElementById('target-0').addEventListener("targetFound", () => {
            window.open(stations[0].url, '_blank');
        });

        function buildUI() {
            const root = document.getElementById('gallery-root');
            root.innerHTML = stations.map((s, i) => `
                <div class="station-card" id="card-${i}">
                    <img src="${s.thumb}" style="width:100%; height:75%; object-fit:cover;">
                    <div style="font-size:8px; text-align:center; padding:8px; color:#fff;">${s.name}</div>
                </div>
            `).join('');
        }
        buildUI();
    </script>
</body>
</html>
