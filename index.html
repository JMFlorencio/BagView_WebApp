<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root { --accent: #00ff88; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000 !important; font-family: 'Segoe UI', sans-serif; color: white; }

        video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: 1 !important; }
        a-scene { z-index: 2 !important; }

        /* 1. WELCOME SCREEN */
        #welcome-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 0.8s ease; }
        .welcome-title { letter-spacing: 12px; font-size: 2.5rem; font-weight: 100; margin-bottom: 5px; }
        .welcome-sub { opacity: 0.5; font-size: 10px; letter-spacing: 4px; margin-bottom: 40px; }
        .start-btn { padding: 18px 45px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 11px; letter-spacing: 3px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }

        /* 2. TUTORIAL SCREEN */
        #tutorial-screen { position: fixed; inset: 0; z-index: 9998; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.8s; }
        .video-frame { width: 90%; max-width: 500px; aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }

        /* 3. MAIN UI */
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0; transition: 0.8s; }
        .top-nav, .bottom-area, .icon-btn, .cam-btn, .station-card { pointer-events: auto; }

        .top-nav { position: absolute; top: 0; left: 0; right: 0; padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .gps-display { background: var(--glass); backdrop-filter: var(--blur); padding: 10px 18px; border-radius: 12px; border-left: 3px solid #444; display: flex; align-items: center; gap: 10px; }
        .gps-display.live { border-left-color: var(--accent); }
        .pulse { width: 8px; height: 8px; background: #444; border-radius: 50%; }
        .pulse.live { background: var(--accent); animation: pulse-anim 2s infinite; }

        .bottom-area { position: absolute; bottom: 0; left: 0; right: 0; }
        .bottom-dock { padding: 20px 0 130px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); opacity: 0; transform: translateY(50px); transition: 0.5s; }
        .bottom-dock.visible { opacity: 1; transform: translateY(0); }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; padding: 20px 20px; scrollbar-width: none; }
        
        .station-card { min-width: 100px; height: 130px; background: #111; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; transition: transform 0.4s; cursor: pointer; position: relative; }
        .station-card.react { transform: translateY(-35px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2); }
        .match-badge { position: absolute; top: 8px; left: 8px; background: var(--accent); color: black; font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; opacity: 0; transition: 0.3s; }
        .station-card.react .match-badge { opacity: 1; }

        .nav-bar { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 25px; }
        .cam-btn { width: 75px; height: 75px; border-radius: 50%; background: #000; border: 3px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .cam-btn.active { border-color: var(--accent); background: var(--accent); }

        #shutter { position: fixed; inset: 0; z-index: 50; background: #000; opacity: 0; transition: 0.8s; pointer-events: none; }
        
        @keyframes pulse-anim { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(2.5); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 class="welcome-title">BAGVIEW</h1>
        <p class="welcome-sub">ECO-TOURISM INTERACTIVE GUIDE</p>
        <button class="start-btn" onclick="showTutorial()">START EXPERIENCE</button>
    </div>

    <div id="tutorial-screen">
        <p style="letter-spacing:3px; font-size:10px; margin-bottom:15px; opacity:0.6;">QUICK WALKTHROUGH</p>
        <div class="video-frame">
            <video id="tuto-video" style="width:100%; height:100%; object-fit:cover;" playsinline loop>
                <source src="Assets/tutorial.mp4" type="video/mp4">
            </video>
        </div>
        <button class="start-btn" onclick="initExperience()" style="padding: 12px 35px; font-size: 10px; border-color: rgba(255,255,255,0.2); color:white;">SKIP GUIDE</button>
    </div>

    <div id="ui-layer">
        <div class="top-nav">
            <div class="gps-display" id="status-box">
                <div class="pulse" id="status-pulse"></div>
                <div id="gps-status" style="font-size:10px; font-weight:900; letter-spacing:1.5px; color:#666;">CAMERA: STANDBY</div>
            </div>
        </div>

        <div class="bottom-area">
            <div class="bottom-dock" id="gallery-hud">
                <div class="scroll-container" id="gallery-root"></div>
            </div>
            <div class="nav-bar">
                <div class="cam-btn active" id="cam-toggle" onclick="toggleScanner()">
                    <svg viewBox="0 0 24 24" width="32" fill="black" id="cam-icon"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm7-4h-2.69l-1.83-2H9.52l-1.83 2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <div id="shutter"></div>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded renderer="transparent: true; alpha: true;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="target-0"></a-entity>
        <a-entity mindar-image-target="targetIndex: 1" id="target-1"></a-entity>
        <a-entity mindar-image-target="targetIndex: 2" id="target-2"></a-entity>
        <a-entity mindar-image-target="targetIndex: 3" id="target-3"></a-entity>
        <a-entity mindar-image-target="targetIndex: 4" id="target-4"></a-entity>
        <a-entity mindar-image-target="targetIndex: 5" id="target-5"></a-entity>
        <a-entity mindar-image-target="targetIndex: 6" id="target-6"></a-entity>
        <a-entity mindar-image-target="targetIndex: 7" id="target-7"></a-entity>
        <a-entity mindar-image-target="targetIndex: 8" id="target-8"></a-entity>
        <a-entity mindar-image-target="targetIndex: 9" id="target-9"></a-entity>
        <a-entity mindar-image-target="targetIndex: 10" id="target-10"></a-entity>
        <a-entity mindar-image-target="targetIndex: 11" id="target-11"></a-entity>
    </a-scene>

    <script>
        const tourLink = "https://tour.panoee.net/69aa67e9add064456619ce3d/69aa73d3add0647cc419cf6d";
        const stations = [
            { name: "Map", thumb: "Assets/A1_Map.jpg", url: "https://jmflorencio.github.io/BaguioBotanicalMap/" },
            { name: "Arbor", thumb: "Assets/Arbor.png", url: tourLink },
            { name: "Cactus & Succulents", thumb: "Assets/Cactus&Succulents.png", url: "https://example.com/cactus" },
            { name: "Chinese Garden", thumb: "Assets/Chinese%20Garden.png", url: "https://example.com/chinese" },
            { name: "Friendship Garden", thumb: "Assets/City%20of%20Vaughan%20Friendship%20Garden.png", url: tourLink },
            { name: "Cordillera Village", thumb: "Assets/Cordillera%20Village.png", url: "https://example.com/cordillera" },
            { name: "Greenhouse", thumb: "Assets/Greenhouse.png", url: "https://example.com/greenhouse" },
            { name: "Japanese Garden", thumb: "Assets/Japanese%20Garden.png", url: tourLink },
            { name: "Japanese Tunnel", thumb: "Assets/Japanese%20Tunnel.png", url: tourLink },
            { name: "Korea Garden", thumb: "Assets/Korea%20Garden.png", url: tourLink },
            { name: "Orchidarium", thumb: "Assets/Orchidarium.png", url: tourLink },
            { name: "PMSEA Garden", thumb: "Assets/PMSEA%20Garden.png", url: tourLink }
        ];

        function showTutorial() {
            const welcome = document.getElementById('welcome-screen');
            const tutorial = document.getElementById('tutorial-screen');
            const video = document.getElementById('tuto-video');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                tutorial.style.display = 'flex';
                setTimeout(() => { tutorial.style.opacity = '1'; video.play(); }, 50);
            }, 800);
        }

        async function initExperience() {
            const tutorial = document.getElementById('tutorial-screen');
            const ui = document.getElementById('ui-layer');
            const video = document.getElementById('tuto-video');
            video.pause();
            tutorial.style.opacity = '0';
            setTimeout(async () => {
                tutorial.style.display = 'none';
                ui.style.opacity = '1';
                ui.style.pointerEvents = 'auto';
                const sceneEl = document.querySelector('a-scene');
                try { await sceneEl.systems['mindar-image-system'].start(); updateStatusUI(true); } catch (err) { console.error(err); }
            }, 800);
        }

        async function toggleScanner() {
            const btn = document.getElementById('cam-toggle');
            const sceneEl = document.querySelector('a-scene');
            const shutter = document.getElementById('shutter');
            if(!btn.classList.contains('active')) {
                await sceneEl.systems['mindar-image-system'].start();
                shutter.style.opacity = '0';
                updateStatusUI(true);
            } else {
                sceneEl.systems['mindar-image-system'].stop();
                shutter.style.opacity = '1';
                updateStatusUI(false);
            }
        }

        function updateStatusUI(isLive) {
            const btn = document.getElementById('cam-toggle');
            const statusBox = document.getElementById('status-box');
            const statusPulse = document.getElementById('status-pulse');
            const statusText = document.getElementById('gps-status');
            const hud = document.getElementById('gallery-hud');
            const camIcon = document.getElementById('cam-icon');

            if(isLive) {
                btn.classList.add('active'); hud.classList.add('visible');
                statusBox.classList.add('live'); statusPulse.classList.add('live');
                statusText.innerText = "CAMERA: LIVE"; statusText.style.color = "var(--accent)";
                camIcon.setAttribute('fill', '#000');
            } else {
                btn.classList.remove('active'); hud.classList.remove('visible');
                statusBox.classList.remove('live'); statusPulse.classList.remove('live');
                statusText.innerText = "CAMERA: STANDBY"; statusText.style.color = "#666";
                camIcon.setAttribute('fill', '#fff');
            }
        }

        stations.forEach((s, i) => {
            const target = document.getElementById(`target-${i}`);
            if(target) {
                target.addEventListener("targetFound", () => {
                    handleVisualReaction(i, true); 
                    window.open(stations[i].url, '_blank'); // ONLY PLACE LINK OPENS
                });
                target.addEventListener("targetLost", () => handleVisualReaction(i, false));
            }
        });

        // Handles the "pop-up" and "matched" badge visual
        function handleVisualReaction(index, forceState) {
            const card = document.getElementById(`card-${index}`);
            document.querySelectorAll('.station-card').forEach(c => c.classList.remove('react'));
            if (forceState) {
                card.classList.add('react');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        // Manual card tap logic (ONLY for viewing/scrolling)
        function handleManualTap(index) {
            const card = document.getElementById(`card-${index}`);
            document.querySelectorAll('.station-card').forEach(c => c.classList.remove('react'));
            card.classList.add('react');
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function buildUI() {
            const root = document.getElementById('gallery-root');
            root.innerHTML = stations.map((s, i) => `
                <div class="station-card" id="card-${i}" onclick="handleManualTap(${i})">
                    <div style="height:75%; background:#1a1a1a; overflow:hidden;">
                        <img src="${s.thumb}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="match-badge">MATCH FOUND</div>
                    <div style="font-size:8px; text-align:center; padding:8px 4px; font-weight:bold; color:#fff;">${s.name}</div>
                </div>
            `).join('');
        }

        buildUI();
    </script>
</body>
</html>
