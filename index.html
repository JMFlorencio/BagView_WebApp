<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root { --accent: #00ff88; --scanning: #ffaa00; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; }

        /* Fix: Video must stay behind everything */
        video { 
            position: fixed !important; top: 0 !important; left: 0 !important; 
            width: 100vw !important; height: 100vh !important;
            object-fit: cover !important; z-index: -5 !important; 
        }

        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .top-nav, .bottom-area, .icon-btn, .cam-btn, .station-card { pointer-events: auto; }

        /* Top Navigation Restored */
        .top-nav { position: absolute; top: 0; left: 0; right: 0; padding: 30px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .gps-display { background: var(--glass); backdrop-filter: var(--blur); padding: 10px 18px; border-radius: 12px; border-left: 3px solid #444; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .gps-display.status-live { border-left-color: var(--scanning); }
        .gps-display.status-match { border-left-color: var(--accent); }

        .pulse { width: 8px; height: 8px; background: #444; border-radius: 50%; } 
        .pulse.live { background: var(--scanning); animation: p-scan 1.5s infinite; }
        .pulse.match { background: var(--accent); animation: p-match 0.5s infinite alternate; }

        /* Bottom Area Restored */
        .bottom-area { position: absolute; bottom: 0; left: 0; right: 0; height: 280px; }
        .bottom-dock { padding-bottom: 120px; opacity: 0; transform: translateY(20px); transition: 0.5s; }
        .bottom-dock.visible { opacity: 1; transform: translateY(0); }
        
        .scroll-container { 
            display: flex; gap: 12px; overflow-x: auto; 
            padding: 0 45vw; scrollbar-width: none; 
            scroll-behavior: smooth; 
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        /* The Toggle Station Card - No Glow */
        .station-card { 
            min-width: 100px; height: 130px; background: #111; border-radius: 16px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(0); 
        }
        .station-card.react { transform: translateY(-30px); border-color: var(--accent); }

        .nav-bar { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 25px; }
        .cam-btn { width: 75px; height: 75px; border-radius: 50%; background: #000; border: 3px solid #333; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .cam-btn.active { border-color: var(--accent); background: var(--accent); }

        /* Overlays */
        .overlay-screen { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .hidden { opacity: 0; pointer-events: none; }

        @keyframes p-scan { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        @keyframes p-match { from { transform: scale(1); } to { transform: scale(1.3); } }
    </style>
</head>
<body>

    <div id="home-page" class="overlay-screen">
        <h1 style="font-size:42px; letter-spacing:8px; font-weight:900;">BAG<span style="color:var(--accent)">VIEW</span></h1>
        <button onclick="goToTutorial()" style="background:var(--accent); border:none; padding:18px 50px; border-radius:50px; font-weight:900; margin-top:50px;">EXPLORE</button>
    </div>

    <div id="tutorial-page" class="overlay-screen hidden">
        <video id="tut-video" style="width:100%; height:100%; object-fit:cover;" playsinline><source src="Assets/tutorial.mp4" type="video/mp4"></video>
        <div style="position:absolute; bottom:50px; font-weight:900; letter-spacing:2px;" onclick="finishTutorial()">SKIP ➔</div>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="top-nav">
            <div class="gps-display" id="status-container">
                <div class="pulse" id="status-pulse"></div>
                <div id="gps-status" style="font-size:11px; font-weight:900;">CAMERA: STANDBY</div>
            </div>
            <div style="background:var(--glass); width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center;">i</div>
        </div>

        <div class="bottom-area">
            <div class="bottom-dock" id="gallery-hud">
                <div class="scroll-container" id="gallery-root"></div>
            </div>
            <div class="nav-bar">
                <div onclick="location.reload()" style="background:var(--glass); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center;">↺</div>
                <div class="cam-btn" id="cam-toggle" onclick="toggleScanner()">
                    <svg viewBox="0 0 24 24" width="32" fill="white" id="cam-icon"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm7-4h-2.69l-1.83-2H9.52l-1.83 2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                </div>
                <div style="background:var(--glass); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center;">?</div>
            </div>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded renderer="transparent: true; alpha: true;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="target-container"></a-entity>
    </a-scene>

    <script>
        const stations = [
            { name: "Map", thumb: "Assets/A1_Map.jpg" },
            { name: "Arbor", thumb: "Assets/Arbor.png" },
            { name: "Cactus", thumb: "Assets/Cactus&Succulents.png" },
            { name: "Chinese Garden", thumb: "Assets/Chinese%20Garden.png" },
            { name: "Friendship", thumb: "Assets/City%20of%20Vaughan%20Friendship%20Garden.png" },
            { name: "Village", thumb: "Assets/Cordillera%20Village.png" },
            { name: "Greenhouse", thumb: "Assets/Greenhouse.png" },
            { name: "Japanese Garden", thumb: "Assets/Japanese%20Garden.png" },
            { name: "Tunnel", thumb: "Assets/Japanese%20Tunnel.png" },
            { name: "Korea Garden", thumb: "Assets/Korea%20Garden.png" },
            { name: "Orchidarium", thumb: "Assets/Orchidarium.png" },
            { name: "PMSEA", thumb: "Assets/PMSEA%20Garden.png" }
        ];

        function buildUI() {
            document.getElementById('gallery-root').innerHTML = stations.map((s, i) => `
                <div class="station-card" id="card-${i}" onclick="handleCardTap(${i})">
                    <div style="height:75%; background:#1a1a1a;"><img src="${s.thumb}" style="width:100%; height:100%; object-fit:cover;"></div>
                    <div style="font-size:8px; text-align:center; padding:8px 4px; font-weight:bold; text-transform:uppercase;">${s.name}</div>
                </div>
            `).join('');
        }

        function updateStatus(type) {
            const box = document.getElementById('status-container');
            const pulse = document.getElementById('status-pulse');
            const txt = document.getElementById('gps-status');
            box.classList.remove('status-live', 'status-match');
            pulse.classList.remove('live', 'match');

            if (type === 'scanning') {
                box.classList.add('status-live'); pulse.classList.add('live');
                txt.innerText = "CAMERA: LIVE"; txt.style.color = "var(--scanning)";
            } else if (type === 'match') {
                box.classList.add('status-match'); pulse.classList.add('match');
                txt.innerText = "MATCH FOUND!"; txt.style.color = "var(--accent)";
            } else {
                txt.innerText = "CAMERA: STANDBY"; txt.style.color = "#fff";
            }
        }

        function handleCardTap(index) {
            const card = document.getElementById(`card-${index}`);
            const isUp = card.classList.contains('react');

            if (isUp) {
                card.classList.remove('react');
            } else {
                document.querySelectorAll('.station-card').forEach(c => c.classList.remove('react'));
                card.classList.add('react');
                const scroll = document.querySelector('.scroll-container');
                const pos = card.offsetLeft - (scroll.offsetWidth / 2) + (card.offsetWidth / 2);
                scroll.scrollTo({ left: pos, behavior: 'smooth' });
            }
        }

        async function toggleScanner() {
            const btn = document.getElementById('cam-toggle');
            if(!btn.classList.contains('active')) {
                await document.querySelector('a-scene').systems['mindar-image-system'].start();
                btn.classList.add('active');
                document.getElementById('gallery-hud').classList.add('visible');
                updateStatus('scanning');
                document.getElementById('cam-icon').setAttribute('fill', '#000');
            } else {
                location.reload();
            }
        }

        function goToTutorial() {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('tutorial-page').classList.remove('hidden');
            document.getElementById('tut-video').play();
        }

        function finishTutorial() {
            document.getElementById('tutorial-page').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            buildUI(); updateStatus('standby');
        }
    </script>
</body>
</html>
