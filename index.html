<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }

        /* ORIGINAL MINIMALIST WELCOME */
        #welcome-page {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .title { letter-spacing: 15px; font-size: 40px; font-weight: 100; margin: 0; }
        .caption { letter-spacing: 5px; font-size: 10px; opacity: 0.5; margin-top: 10px; margin-bottom: 40px; text-transform: uppercase; }
        
        .start-btn {
            padding: 12px 35px; border: 1px solid white; background: none;
            color: white; font-size: 10px; letter-spacing: 3px; cursor: pointer;
        }

        /* RESTORED WALKTHROUGH LAYOUT */
        #walkthrough-page {
            position: fixed; inset: 0; z-index: 9998; background: #000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .video-frame {
            width: 80%; max-width: 500px; aspect-ratio: 16/9;
            border: 2px solid #00ff88; /* Your Green Accent */
            background: #000; overflow: hidden;
        }
        video#tutorial-video { width: 100%; height: 100%; object-fit: cover; }
        
        .skip-link {
            margin-top: 25px; background: none; border: none;
            color: #666; font-size: 10px; letter-spacing: 2px;
            text-decoration: underline; cursor: pointer;
        }

        /* UI LAYER */
        #ui-layer { position: fixed; inset: 0; z-index: 100; display: none; pointer-events: none; }
        #gallery {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: flex; gap: 15px; overflow-x: auto; padding: 0 20px;
            scrollbar-width: none; pointer-events: auto;
        }
        .card {
            min-width: 90px; height: 120px; background: #111; border: 1px solid #333;
            flex-shrink: 0; transition: 0.3s;
        }
        .card.active { transform: translateY(-25px); border-color: #00ff88; }
        
        /* MindAR Fix */
        .mindar-ui-overlay { display: none !important; }
    </style>
</head>
<body>

    <div id="welcome-page">
        <h1 class="title">BAGVIEW</h1>
        <p class="caption">ENVIRONMENTAL AR GUIDE</p>
        <button class="start-btn" onclick="openWalkthrough()">START</button>
    </div>

    <div id="walkthrough-page">
        <div class="video-frame">
            <video id="tutorial-video" playsinline loop>
                <source src="Assets/tutorial.mp4" type="video/mp4">
            </video>
        </div>
        <button class="skip-link" onclick="enterAR()">SKIP TUTORIAL</button>
    </div>

    <div id="ui-layer">
        <div id="gallery"></div>
    </div>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="t0"></a-entity>
        <a-entity mindar-image-target="targetIndex: 1" id="t1"></a-entity>
        <a-entity mindar-image-target="targetIndex: 2" id="t2"></a-entity>
        <a-entity mindar-image-target="targetIndex: 3" id="t3"></a-entity>
        <a-entity mindar-image-target="targetIndex: 4" id="t4"></a-entity>
        <a-entity mindar-image-target="targetIndex: 5" id="t5"></a-entity>
        <a-entity mindar-image-target="targetIndex: 6" id="t6"></a-entity>
        <a-entity mindar-image-target="targetIndex: 7" id="t7"></a-entity>
        <a-entity mindar-image-target="targetIndex: 8" id="t8"></a-entity>
        <a-entity mindar-image-target="targetIndex: 9" id="t9"></a-entity>
        <a-entity mindar-image-target="targetIndex: 10" id="t10"></a-entity>
        <a-entity mindar-image-target="targetIndex: 11" id="t11"></a-entity>
    </a-scene>

    <script>
        const panoLink = "https://tour.panoee.net/69aa67e9add064456619ce3d/69aa73d3add0647cc419cf6d";
        const stations = [
            { name: "MAP", thumb: "Assets/A1_Map.jpg", url: "https://jmflorencio.github.io/BaguioBotanicalMap/" },
            { name: "ARBOR", thumb: "Assets/Arbor.png", url: panoLink },
            { name: "CACTUS", thumb: "Assets/Cactus&Succulents.png", url: "#" },
            { name: "CHINESE", thumb: "Assets/Chinese%20Garden.png", url: "#" },
            { name: "FRIENDSHIP", thumb: "Assets/City%20of%20Vaughan%20Friendship%20Garden.png", url: panoLink },
            { name: "VILLAGE", thumb: "Assets/Cordillera%20Village.png", url: "#" },
            { name: "GREENHOUSE", thumb: "Assets/Greenhouse.png", url: "#" },
            { name: "JAPANESE", thumb: "Assets/Japanese%20Garden.png", url: panoLink },
            { name: "TUNNEL", thumb: "Assets/Japanese%20Tunnel.png", url: panoLink },
            { name: "KOREA", thumb: "Assets/Korea%20Garden.png", url: panoLink },
            { name: "ORCHID", thumb: "Assets/Orchidarium.png", url: panoLink },
            { name: "PMSEA", thumb: "Assets/PMSEA%20Garden.png", url: panoLink }
        ];

        function openWalkthrough() {
            document.getElementById('welcome-page').style.display = 'none';
            const walk = document.getElementById('walkthrough-page');
            walk.style.display = 'flex';
            document.getElementById('tutorial-video').play();
        }

        async function enterAR() {
            document.getElementById('tutorial-video').pause();
            document.getElementById('walkthrough-page').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            
            const sceneEl = document.querySelector('a-scene');
            await sceneEl.systems['mindar-image-system'].start();
        }

        // TARGET LOGIC: OPEN LINK ONLY ON MATCH
        stations.forEach((s, i) => {
            const target = document.getElementById(`t${i}`);
            if(target) {
                target.addEventListener("targetFound", () => {
                    const card = document.getElementById(`card-${i}`);
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                    if(card) {
                        card.classList.add('active');
                        card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                    }
                    window.open(stations[i].url, '_blank');
                });
                target.addEventListener("targetLost", () => {
                    document.getElementById(`card-${i}`).classList.remove('active');
                });
            }
        });

        function buildUI() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = stations.map((s, i) => `
                <div class="card" id="card-${i}">
                    <img src="${s.thumb}" style="width:100%; height:75%; object-fit:cover;">
                    <div style="font-size:7px; text-align:center; padding-top:8px; letter-spacing:1px;">${s.name}</div>
                </div>
            `).join('');
        }

        buildUI();
    </script>
</body>
</html>
