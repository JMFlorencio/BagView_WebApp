<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root { --accent: #00ff88; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000 !important; font-family: 'Segoe UI', sans-serif; color: white; }

        /* FIX: Ensure MindAR video is visible */
        video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: 1 !important; }
        a-scene { z-index: 2 !important; }

        /* WELCOME/START PAGE */
        #welcome-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 0.5s; }
        .start-btn { padding: 20px 40px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; letter-spacing: 2px; border-radius: 50px; cursor: pointer; margin-top: 20px; }

        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0; transition: 0.5s; }
        .top-nav, .bottom-area, .advisory-bar, .icon-btn, .cam-btn, .station-card, .noti-bell, #inquiry-panel { pointer-events: auto; }

        /* TOP NAVIGATION */
        .top-nav { position: absolute; top: 0; left: 0; right: 0; padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .gps-display { background: var(--glass); backdrop-filter: var(--blur); padding: 10px 18px; border-radius: 12px; border-left: 3px solid #444; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .gps-display.live { border-left-color: var(--accent); }
        .pulse { width: 8px; height: 8px; background: #444; border-radius: 50%; }
        .pulse.live { background: var(--accent); animation: pulse-anim 2s infinite; }

        /* ADVISORY BAR */
        .advisory-bar { position: fixed; top: -120px; left: 20px; right: 20px; background: #ffcc00; color: #000; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; transition: 0.6s; z-index: 4000; }
        .advisory-bar.active { top: 30px; }

        /* INQUIRY PANEL */
        #inquiry-panel { position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; padding: 40px 20px; flex-direction: column; }
        .inquiry-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 2px solid var(--accent); }

        /* BOTTOM AREA & DOCK */
        .bottom-area { position: absolute; bottom: 0; left: 0; right: 0; }
        .bottom-dock { padding: 20px 0 130px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); opacity: 0; transform: translateY(50px); transition: 0.5s; }
        .bottom-dock.visible { opacity: 1; transform: translateY(0); }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; padding: 20px 20px; scrollbar-width: none; }
        
        .station-card { min-width: 100px; height: 130px; background: #111; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; transition: transform 0.4s; cursor: pointer; }
        .station-card.react { transform: translateY(-35px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2); }

        .nav-bar { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 25px; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cam-btn { width: 75px; height: 75px; border-radius: 50%; background: #000; border: 3px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .cam-btn.active { border-color: var(--accent); background: var(--accent); }

        #shutter { position: fixed; inset: 0; z-index: 50; background: #000; opacity: 0; transition: 0.8s; pointer-events: none; }
        
        @keyframes pulse-anim { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(2.5); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="letter-spacing:10px;">BAGVIEW</h1>
        <p style="opacity:0.6; font-size:12px;">ECO-TOURISM INTERACTIVE GUIDE</p>
        <button class="start-btn" onclick="initExperience()">START SCANNER</button>
    </div>

    <div id="advisory-trigger" class="advisory-bar" onclick="this.classList.remove('active')">
        <div style="font-size:24px;">⚠️</div>
        <div>
            <div style="font-weight:900; font-size:12px;">PARK ADVISORY</div>
            <div style="font-size:10px; opacity:0.8;">Japanese Tunnel section closed for maintenance.</div>
        </div>
    </div>

    <div id="inquiry-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="letter-spacing:5px; margin:0;">INQUIRY</h2>
            <div onclick="toggleInquiry()" style="cursor:pointer; background:rgba(255,255,255,0.1); border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center;">✕</div>
        </div>
        <div class="inquiry-card">
            <h4 style="color:var(--accent); margin:0;">OPERATING HOURS</h4>
            <p style="font-size:12px; opacity:0.7;">Daily: 6:00 AM - 6:00 PM</p>
        </div>
    </div>

    <div id="ui-layer">
        <div class="top-nav">
            <div class="gps-display" id="status-box">
                <div class="pulse" id="status-pulse"></div>
                <div id="gps-status" style="font-size:10px; font-weight:900; letter-spacing:1.5px; color:#666;">CAMERA: STANDBY</div>
            </div>
            <div class="noti-bell" onclick="showAdvisory()">
                <svg viewBox="0 0 24 24" width="20" fill="white"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            </div>
        </div>

        <div class="bottom-area">
            <div class="bottom-dock" id="gallery-hud">
                <div class="scroll-container" id="gallery-root"></div>
            </div>
            <div class="nav-bar">
                <div class="icon-btn" onclick="toggleInquiry()"><svg viewBox="0 0 24 24" width="22" fill="#fff"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/></svg></div>
                <div class="cam-btn active" id="cam-toggle" onclick="toggleScanner()"><svg viewBox="0 0 24 24" width="32" fill="black" id="cam-icon"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm7-4h-2.69l-1.83-2H9.52l-1.83 2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></div>
                <div class="icon-btn" onclick="location.reload()"><svg viewBox="0 0 24 24" width="22" fill="#fff"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></div>
            </div>
        </div>
    </div>

    <div id="shutter"></div>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded renderer="transparent: true; alpha: true;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0" id="target-0"></a-entity>
        <a-entity mindar-image-target="targetIndex: 1" id="target-1"></a-entity>
        <a-entity mindar-image-target="targetIndex: 2" id="target-2"></a-entity>
        <a-entity mindar-image-target="targetIndex: 3" id="target-3"></a-entity>
        <a-entity mindar-image-target="targetIndex: 4" id="target-4"></a-entity>
        <a-entity mindar-image-target="targetIndex: 5" id="target-5"></a-entity>
        <a-entity mindar-image-target="targetIndex: 6" id="target-6"></a-entity>
        <a-entity mindar-image-target="targetIndex: 7" id="target-7"></a-entity>
        <a-entity mindar-image-target="targetIndex: 8" id="target-8"></a-entity>
        <a-entity mindar-image-target="targetIndex: 9" id="target-9"></a-entity>
        <a-entity mindar-image-target="targetIndex: 10" id="target-10"></a-entity>
        <a-entity mindar-image-target="targetIndex: 11" id="target-11"></a-entity>
    </a-scene>

    <script>
        const stations = [
            { name: "Map", thumb: "Assets/A1_Map.jpg" },
            { name: "Arbor", thumb: "Assets/Arbor.png" },
            { name: "Cactus & Succulents", thumb: "Assets/Cactus&Succulents.png" },
            { name: "Chinese Garden", thumb: "Assets/Chinese%20Garden.png" },
            { name: "Friendship Garden", thumb: "Assets/City%20of%20Vaughan%20Friendship%20Garden.png" },
            { name: "Cordillera Village", thumb: "Assets/Cordillera%20Village.png" },
            { name: "Greenhouse", thumb: "Assets/Greenhouse.png" },
            { name: "Japanese Garden", thumb: "Assets/Japanese%20Garden.png" },
            { name: "Japanese Tunnel", thumb: "Assets/Japanese%20Tunnel.png" },
            { name: "Korea Garden", thumb: "Assets/Korea%20Garden.png" },
            { name: "Orchidarium", thumb: "Assets/Orchidarium.png" },
            { name: "PMSEA Garden", thumb: "Assets/PMSEA%20Garden.png" }
        ];

        async function initExperience() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 500);
            document.getElementById('ui-layer').style.opacity = '1';
            
            // Start the AR system immediately after user click
            const sceneEl = document.querySelector('a-scene');
            await sceneEl.systems['mindar-image-system'].start();
            updateStatusUI(true);
        }

        async function toggleScanner() {
            const btn = document.getElementById('cam-toggle');
            const sceneEl = document.querySelector('a-scene');
            const shutter = document.getElementById('shutter');
            
            if(!btn.classList.contains('active')) {
                await sceneEl.systems['mindar-image-system'].start();
                shutter.style.opacity = '0';
                updateStatusUI(true);
            } else {
                sceneEl.systems['mindar-image-system'].stop();
                shutter.style.opacity = '1';
                updateStatusUI(false);
            }
        }

        function updateStatusUI(isLive) {
            const btn = document.getElementById('cam-toggle');
            const statusBox = document.getElementById('status-box');
            const statusPulse = document.getElementById('status-pulse');
            const statusText = document.getElementById('gps-status');
            const hud = document.getElementById('gallery-hud');
            const camIcon = document.getElementById('cam-icon');

            if(isLive) {
                btn.classList.add('active');
                hud.classList.add('visible');
                statusBox.classList.add('live');
                statusPulse.classList.add('live');
                statusText.innerText = "CAMERA: LIVE";
                statusText.style.color = "var(--accent)";
                camIcon.setAttribute('fill', '#000');
            } else {
                btn.classList.remove('active');
                hud.classList.remove('visible');
                statusBox.classList.remove('live');
                statusPulse.classList.remove('live');
                statusText.innerText = "CAMERA: STANDBY";
                statusText.style.color = "#666";
                camIcon.setAttribute('fill', '#fff');
            }
        }

        // Logic for AR matching and Card Toggling
        stations.forEach((s, i) => {
            const target = document.getElementById(`target-${i}`);
            if(target) {
                target.addEventListener("targetFound", () => handleCardTap(i, true));
                target.addEventListener("targetLost", () => handleCardTap(i, false));
            }
        });

        function handleCardTap(index, forceState) {
            const card = document.getElementById(`card-${index}`);
            // Toggle logic: If no forceState, it flips the current state.
            const shouldReact = (forceState !== undefined) ? forceState : !card.classList.contains('react');
            
            document.querySelectorAll('.station-card').forEach(c => c.classList.remove('react'));
            if (shouldReact) {
                card.classList.add('react');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function toggleInquiry() {
            const panel = document.getElementById('inquiry-panel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        function showAdvisory() {
            document.getElementById('advisory-trigger').classList.add('active');
        }

        function buildUI() {
            const root = document.getElementById('gallery-root');
            root.innerHTML = stations.map((s, i) => `
                <div class="station-card" id="card-${i}" onclick="handleCardTap(${i})">
                    <div style="height:75%; background:#1a1a1a; overflow:hidden;">
                        <img src="${s.thumb}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div style="font-size:8px; text-align:center; padding:8px 4px; font-weight:bold; color:#fff;">${s.name}</div>
                </div>
            `).join('');
        }

        buildUI();
    </script>
</body>
</html>
