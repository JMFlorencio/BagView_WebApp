<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root { --accent: #00ff88; --error: #ff4444; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent !important; font-family: 'Segoe UI', sans-serif; color: white; }

        video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: -1 !important; }

        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; transition: 0.5s; }
        .top-nav, .bottom-area, .advisory-bar, .icon-btn, .cam-btn, .station-card, #inquiry-panel, .noti-bell { pointer-events: auto; }

        /* NOTIFICATIONS */
        #match-notification { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 50px; font-weight: 900; font-size: 11px; letter-spacing: 2px; z-index: 5000; opacity: 0; transition: 0.3s; pointer-events: none; backdrop-filter: blur(10px); background: var(--accent); color: #000; text-align: center; min-width: 220px; }
        #match-notification.show { opacity: 1; top: 120px; }

        .noti-bell { position: relative; width: 45px; height: 45px; background: var(--glass); backdrop-filter: var(--blur); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .noti-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; border: 2px solid #000; display: none; }
        .noti-dot.active { display: block; }

        .advisory-bar { position: fixed; top: -100px; left: 20px; right: 20px; background: #ffcc00; color: #000; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 4000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer; }
        .advisory-bar.active { top: 30px; }

        /* UI ELEMENTS */
        .top-nav { position: absolute; top: 0; left: 0; right: 0; padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .gps-display { background: var(--glass); backdrop-filter: var(--blur); padding: 10px 18px; border-radius: 12px; border-left: 3px solid #555; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .gps-display.live { border-left-color: var(--accent); }
        .pulse { width: 8px; height: 8px; background: #555; border-radius: 50%; }
        .pulse.live { background: var(--accent); animation: pulse-anim 2s infinite; }

        .bottom-dock { padding: 20px 0 130px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); opacity: 0; transform: translateY(50px); transition: 0.5s; }
        .bottom-dock.visible { opacity: 1; transform: translateY(0); }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; padding: 20px 20px; scrollbar-width: none; }
        
        .station-card { min-width: 100px; height: 130px; background: #111; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s ease; cursor: pointer; }
        .station-card.react { transform: translateY(-30px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0, 255, 136, 0.3); }

        .nav-bar { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 25px; }
        .cam-btn { width: 75px; height: 75px; border-radius: 50%; background: #000; border: 3px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .cam-btn.active { border-color: var(--accent); background: var(--accent); transform: scale(1.1); }

        #shutter { position: fixed; inset: 0; z-index: -1; background: #000; transition: 0.8s; pointer-events: none; }
        
        @keyframes pulse-anim { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }
    </style>
</head>
<body>

    <div id="match-notification">IDENTICAL MATCH</div>

    <div id="ui-layer" class="hidden">
        <div class="top-nav">
            <div class="gps-display" id="status-box">
                <div class="pulse" id="status-pulse"></div>
                <div id="gps-status" style="font-size:10px; font-weight:900; letter-spacing:1px; color:#aaa;">CAMERA: STANDBY</div>
            </div>
            
            <div class="noti-bell" onclick="showAdvisory()">
                <svg viewBox="0 0 24 24" width="20" fill="white"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                <div class="noti-dot active" id="noti-dot"></div>
            </div>
        </div>

        <div class="bottom-area">
            <div class="bottom-dock" id="gallery-hud">
                <div class="scroll-container" id="gallery-root"></div>
            </div>
            <div class="nav-bar">
                <div class="icon-btn" onclick="toggleInquiry()"><svg viewBox="0 0 24 24" width="22" fill="#fff"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/></svg></div>
                <div class="cam-btn" id="cam-toggle" onclick="toggleScanner()"><svg viewBox="0 0 24 24" width="32" fill="white" id="cam-icon"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm7-4h-2.69l-1.83-2H9.52l-1.83 2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></div>
                <div class="icon-btn" onclick="location.reload()"><svg viewBox="0 0 24 24" width="22" fill="#fff"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></div>
            </div>
        </div>
    </div>

    <div id="advisory-trigger" class="advisory-bar" onclick="this.classList.remove('active')">
        <div style="font-size:24px;">⚠️</div>
        <div>
            <div style="font-weight:900; font-size:12px; letter-spacing:1px;">PARK ADVISORY</div>
            <div style="font-size:10px; opacity:0.8;">Maintenance at Japanese Tunnel section. Please use the upper trail.</div>
        </div>
    </div>

    <div id="shutter"></div>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded renderer="transparent: true; alpha: true;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="target-container"></a-entity>
    </a-scene>

    <script>
        // ... stations array same as before ...

        function showAdvisory() {
            document.getElementById('advisory-trigger').classList.add('active');
            document.getElementById('noti-dot').classList.remove('active');
        }

        async function toggleScanner() {
            const btn = document.getElementById('cam-toggle');
            const statusBox = document.getElementById('status-box');
            const statusPulse = document.getElementById('status-pulse');
            const statusText = document.getElementById('gps-status');
            const camIcon = document.getElementById('cam-icon');
            const sceneEl = document.querySelector('a-scene');
            const hud = document.getElementById('gallery-hud');
            
            if(!btn.classList.contains('active')) {
                try {
                    await sceneEl.systems['mindar-image-system'].start();
                    btn.classList.add('active');
                    hud.classList.add('visible');
                    document.getElementById('shutter').style.opacity = '0';
                    
                    // Update Status to LIVE
                    statusBox.classList.add('live');
                    statusPulse.classList.add('live');
                    statusText.innerText = "CAMERA: LIVE";
                    statusText.style.color = "var(--accent)";
                    camIcon.setAttribute('fill', '#000');
                } catch (err) { alert("Camera Error"); }
            } else {
                // Standby Logic
                sceneEl.systems['mindar-image-system'].stop();
                btn.classList.remove('active');
                hud.classList.remove('visible');
                document.getElementById('shutter').style.opacity = '1';
                
                // Update Status to STANDBY
                statusBox.classList.remove('live');
                statusPulse.classList.remove('live');
                statusText.innerText = "CAMERA: STANDBY";
                statusText.style.color = "#aaa";
                camIcon.setAttribute('fill', '#fff');
            }
        }

        function finishTutorial() {
            document.getElementById('tut-video').pause();
            document.getElementById('tutorial-page').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            buildUI();
            setupTracking();
            // Start in standby, dot alert active
            document.getElementById('noti-dot').classList.add('active');
        }

        // ... rest of helper functions (buildUI, handleCardTap, etc) ...
    </script>
</body>
</html>
